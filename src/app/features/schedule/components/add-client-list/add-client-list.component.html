<div
  class="bg-white rounded-2xl shadow-xl p-6 m-1 max-w-4xl w-full mx-auto max-h-[85vh] overflow-y-auto custom-modal-container"
>
  <div class="text-center mb-6 sticky top-0 bg-white pt-2 pb-4 z-10 border-b border-gray-100 flex flex-col items-center gap-2">
    <div class="h-12 w-12 rounded-xl bg-blue-50 border border-blue-100 flex items-center justify-center text-blue-600 mb-1">
      <i class="ph-user-plus text-2xl"></i>
    </div>
    <span
      class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-600 block"
    >
      {{ title }}
    </span>
  </div>

  <form [formGroup]="form" class="flex flex-col gap-5">
    <div class="flex flex-col gap-4 w-full">
      <div class="search-bar-wrapper bg-gray-50/50 p-3 rounded-xl border border-gray-100/80 sticky top-20 bg-white z-10 pb-3">
        <app-filter-bar
          (formValues)="onSearch($event)"
          class="w-full"
        ></app-filter-bar>
      </div>

      <div class="rounded-2xl overflow-hidden shadow-sm border border-gray-100 custom-table-wrapper">
        <app-table
          [data]="clientsAssignable$ | async"
          [displayedColumns]="['name', 'CI', 'email']"
          [isSelect]="true"
          [loading]="loadingAssignable$ | async"
          [total]="totalClients$ | async"
          (selectionChange)="toggleClient($event)"
          [selected]="clientSelected"
          class="w-full"
        >
          <mat-paginator
            class="border-t border-gray-200 bg-white text-gray-700 sticky bottom-0"
            [length]="(totalClients$ | async) || 0"
            [pageSize]="pageSize"
            (page)="paginate($event)"
          ></mat-paginator>
        </app-table>
      </div>

      <div
        *ngIf="filteredClients && filteredClients.length > 0"
        class="mt-4 max-h-60 overflow-y-auto pr-1 selection-list-wrapper"
      >
        <span
          class="text-lg font-semibold text-gray-700 mb-2 sticky top-0 bg-white z-10 pb-2 block"
        >
          Clientes seleccionados
        </span>
        <div
          class="h-px w-full bg-gradient-to-r from-blue-200 to-cyan-200 rounded-full mb-3"
        ></div>
        <mat-selection-list
          #shoesList
          [formControl]="clientsControl"
          name="shoes"
          [multiple]="false"
          class="border border-gray-100 rounded-xl"
        >
          @for (client of filteredClients; track client) {
            <mat-list-option [value]="client._id" class="hover:bg-blue-50/50 transition-colors">
              {{ client.email }}
            </mat-list-option>
          }
        </mat-selection-list>
      </div>
    </div>

    <div
      class="flex justify-end space-x-3 pt-5 mt-2 sticky bottom-0 bg-white z-10 border-t border-gray-50 pb-2"
    >
      <button
        class="bg-gray-100 hover:bg-gray-200/80 text-gray-600 font-semibold py-2.5 px-6 rounded-xl shadow-sm hover:shadow transition-all duration-300 active:scale-95"
        (click)="cancel()"
      >
        Cancelar
      </button>
      <button
        class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-700 hover:to-cyan-700 text-white font-semibold py-2.5 px-6 rounded-xl shadow-md hover:shadow-lg transition-all duration-300 active:scale-95 disabled:from-blue-400 disabled:to-cyan-400 disabled:opacity-50 disabled:cursor-not-allowed"
        (click)="addClient()"
        [disabled]="selectedClients.length === 0"
      >
        Agregar cliente
      </button>
    </div>
  </form>
</div>
